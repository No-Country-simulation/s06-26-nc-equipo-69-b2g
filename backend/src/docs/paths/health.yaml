paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns service status and current server timestamp. Use this to verify the API is reachable.
      operationId: getHealth
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-06-15T14:00:00.000Z'
